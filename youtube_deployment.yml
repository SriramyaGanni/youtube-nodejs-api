apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-deployment
  labels:
    app: youtube
spec:
  replicas: 2
  selector:
    matchLabels:
      app: youtube
  template:
    metadata:
      labels:
        app: youtube
    spec:
      containers:
        - name: youtube-container
          image: sriramyaganni/youtube-webapp:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: youtube-service
spec:
  selector:
    app: youtube
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
